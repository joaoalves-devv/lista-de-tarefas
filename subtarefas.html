<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Subtarefas</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="subtarefas.css">


</head>

<body style="height: 100vh !important;">
  <div class="container">
    <div class="titlesSub">
      <h2 id="tituloPagina">Subtarefas</h2>
      <button onclick="voltar()">⬅ Voltar</button>
    </div>

    <!-- 🔎 PESQUISA E FILTROS -->
    <div class="filtros">
      <input type="text" id="pesquisa" placeholder="Pesquisar tarefa...">
      <!-- <button onclick="abrirModalFiltros()">FIltrar</button> -->
    </div>
    <!-- BOTÕES -->
    <div class="botoesGeral">
      <button onclick="abrirModalSubTarefa()">Adicionar SubTarefa</button>
      <!-- <button onclick="exportarPDF()">📄 Exportar PDF</button> -->
      <span id="botoesExtras"></span>
    </div>
    <p id="mensagem"></p>
    <!-- LOADER -->
    <div id="loader" class="loader"></div>
    <div id="modalConfirmacao"></div>

    <!-- TABELA -->
    <div class="lista-wrapper">
      <table id="tabelaTarefas">
        <thead>
          <tr>
            <th onclick="ordenarId()" style="cursor: pointer">ID</th>
            <th onclick="ordenarTarefas()" style="cursor: pointer;">Tarefa</th>
            <th onclick="ordenarDescricao()" style="cursor: pointer;">Descrição</th>
            <th onclick="ordenarPrioridade()" style="cursor: pointer;">Prioridade</th>
            <th onclick="ordenarstatus()" style="cursor: pointer;">Status</th>
            <th onclick="ordenarCriacao()" style="cursor: pointer;">Criação</th>
            <th>Ações</th>
          </tr>
        </thead>
      <tbody id="tbodySubtarefas"></tbody>

      </table>
    </div>

    <!-- 🔲 MODAL -->
    <div id="modal" class="modal">
      <div class="modal-content">
        <h2 id="tituloModalCriacao">Nova Tarefa</h2>

          <input type="text" id="inputTarefa" placeholder="Digite a tarefa">
        <div>
          <textarea name="descrição" id="inputDescricao" placeholder="Digite a descrição da sua tarefa"></textarea>
        </div>
        <div style="display: flex;     justify-content: space-between;">

          <select id="prioridadeTarefa">
            <option value="Baixa">Baixa</option>
            <option value="Média">Média</option>
            <option value="Alta">Alta</option>
          </select>

          <select id="statusTarefa">
            <option value="Em aberto">Em aberto</option>
            <option value="concluida">Concluída</option>
            <option value="cancelada">Cancelada</option>
            <!-- <option value="vencida">Vencida</option> -->
          </select>

        </div>
        <div class="modal-botoes">
          <button onclick="fecharModal()">Cancelar</button>
          <button onclick="adicionarSubTarefa()" id="botaoFinalizarCadastro">Salvar</button>
        </div>
      </div>
    </div>

       
    <!-- 🔲 MODAL SUBTAREFA-->
    <div id="modalSubTarefa" class="modalSubTarefa">
      <div class="modal-content-sub">
        <h2 id="tituloModalCriacaoSub">Nova Subtarefa</h2>
          <div class="flex-column">
            <label for="inputTarefaSub">Titulo</label>
            <input type="text" id="inputTarefaSub" placeholder="Digite a subtarefa">
          </div>
        <div class="flex-column">
          <label for="inputDescricaoSub">Descrição</label>
          <textarea name="descrição" id="inputDescricaoSub" placeholder="Digite a descrição da sua subtarefa"></textarea>
        </div>
        <div style="display: flex;     justify-content: space-between;">
          <div class="flex-column">
            <label for="prioridadeTarefaSub">Prioridade</label>
            <select id="prioridadeTarefaSub">
              <option value="Baixa">Baixa</option>
              <option value="Média">Média</option>
              <option value="Alta">Alta</option>
            </select>
          </div>
          <div class="flex-column">

            <label for="statusTarefaSub">Status</label>
            <select id="statusTarefaSub"> 
              <option value="Em aberto">Em aberto</option>
              <option value="concluida">Concluída</option>
              <option value="cancelada">Cancelada</option>
            </select>
          </div>

        </div>
        <div class="modal-botoes">
          <button onclick="fecharModalSubTarefa()">Cancelar</button>
          <button onclick="adicionarSubTarefa()" id="botaoFinalizarCadastroSub">Salvar</button>
        </div>
      </div>
    </div>

    <!-- MODAL FILTRO -->
    <div id="modalFiltros" class="modalFiltros">
      <div class="modal-content-filtros">
        <div class="between">
          <h2 style="width: 100%;">Filtros</h2>
          <span onclick="fecharModalFiltros()" class="pointer">X</span>
        </div>
        <div class="between">
          <div class="flex-column">

            <label for="filtroStatus">Status</label>
            <select id="filtroStatus">
              <option value="">Todos</option>
              <option value="Em aberto">Em aberto</option>
              <option value="concluida">Concluída</option>
              <option value="cancelada">Cancelada</option>
            </select>
          </div>
          <div class="flex-column">

            <label for="filtroPrioridade">Prioridade</label>
            <select id="filtroPrioridade">
              <option value="">Todas</option>
              <option value="Baixa">Baixa</option>
              <option value="Média">Média</option>
              <option value="Alta">Alta</option>
            </select>
          </div>
        </div>

        <div class="modal-botoes-filtros; between">
          <button onclick="limparFiltros()">Limpar Filtros</button>
          <button onclick="aplicarFiltros()">Filtrar</button>
        </div>
      </div>
    </div>
  </div>
  </div>
  <script src="subtarefas.js"></script>
  <!-- SweetAlert2 -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>

</html>
